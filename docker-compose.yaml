  services:
    base: &base
      image: chatwoot/chatwoot:v4.7.0
      container_name: chatwoot
      hostname: lchatwoot
      env_file: .env 
      stdin_open: true 
      tty: true  
      networks: 
        - evolution-network     
    
    rails:
      <<: *base
      container_name: chatwoot-rails
      hostname: chatwoot-rails
      depends_on:
        - postgres-chatwoot
        - redis-chatwoot
      environment:
        - NODE_ENV=production
        - RAILS_ENV=production
      networks: 
        - evolution-network
      entrypoint: docker/entrypoints/rails.sh
      command: ['bundle', 'exec', 'rails', 's', '-p', '3000', '-b', '0.0.0.0']

    sidekiq:
      <<: *base
      container_name: chatwoot-sidekiq
      hostname: chatwoot-sidekiq
      depends_on:
        - postgres-chatwoot
        - redis-chatwoot
      environment:
        - NODE_ENV=production
        - RAILS_ENV=production
      networks: 
        - evolution-network
      restart: unless-stopped
      command: ['bundle', 'exec', 'sidekiq', '-C', 'config/sidekiq.yml']

    postgres-chatwoot:
      image: pgvector/pgvector:pg14
      container_name: postgres-chatwoot
      hostname: postgres-chatwoot
      restart: always
      volumes:
        - ./database/chatwoot/postgres:/var/lib/postgresql/data
      environment:
        - POSTGRES_DB=chatwoot
        - POSTGRES_USER=postgres
        - POSTGRES_PASSWORD=chatwoot
      networks: 
        - evolution-network
      
    postgres-evolution:
      image: postgres:14
      container_name: postgres-evolution
      hostname: postgres-evolution
      restart: always
      volumes:
        - ./database/evolution/postgres:/var/lib/postgresql/data
      environment:
        - POSTGRES_DB=evolution
        - POSTGRES_USER=postgres
        - POSTGRES_PASSWORD=evolution
      networks: 
        - evolution-network
    
    pgadmin:
      image: dpage/pgadmin4:latest
      container_name: chatwoot-pgadmin4
      hostname: chatwoot-pgadmin4
      environment:
        PGADMIN_DEFAULT_EMAIL: "demo@demo.com.br"
        PGADMIN_DEFAULT_PASSWORD: "PgAdmin2021!"
      depends_on:
        - postgres-chatwoot
      networks:
        - evolution-network

    redis-chatwoot:
      image: redis:alpine
      container_name: redis-chatwoot
      hostname: redis-chatwoot
      restart: always
      command: ["sh", "-c", "redis-server --requirepass \"$REDIS_PASSWORD\""]
      env_file: .env
      volumes:
        - ./database/chatwoot/redis:/data
      networks: 
        - evolution-network

    redis-evolution:
      image: redis:alpine
      container_name: redis-evolution
      hostname: redis-evolution
      restart: always
      command: [ "redis-server", "--appendonly", "yes", "--port", "6379" ]
      env_file:
        - ./evolution-api/.env
      volumes:
        - ./database/evolution/redis:/data
      networks: 
        - evolution-network
    
    evolution:
      image: evoapicloud/evolution-api:v2.3.6
      container_name: evolution-api
      volumes:
        - ./evolution-api/evolution_instances:/evolution/instances
      networks:
        - evolution-network
      env_file:
        - ./evolution-api/.env

    postgres-n8n:
      image: postgres:14
      container_name: postgres-n8n
      hostname: postgres-n8n
      restart: always
      volumes:
        - ./database/n8n/postgres:/var/lib/postgresql/data
      environment:
        - POSTGRES_DB=n8n
        - POSTGRES_USER=postgres
        - POSTGRES_PASSWORD=n8n
      networks: 
        - evolution-network
      healthcheck:
        test: ["CMD-SHELL", "pg_isready -U postgres -d n8n"]
        interval: 10s
        timeout: 5s
        retries: 5

    n8n:
      image: n8nio/n8n:1.119.2
      container_name: n8n
      hostname: n8n
      restart: unless-stopped
      environment:
        - DB_TYPE=postgresdb
        - DB_POSTGRESDB_HOST=postgres-n8n
        - DB_POSTGRESDB_PORT=5432
        - DB_POSTGRESDB_DATABASE=n8n
        - DB_POSTGRESDB_USER=postgres
        - DB_POSTGRESDB_PASSWORD=n8n
        - N8N_PROTOCOL=http
        - N8N_HOST=localhost:8083
        - N8N_PORT=5678
        - WEBHOOK_URL=http://n8n:5678/
        - N8N_EDITOR_BASE_URL=http://localhost:8083
        - N8N_PROXY_HOPS=1
        - N8N_SECURE_COOKIE=false
        - N8N_PATH=/
        - N8N_LOG_LEVEL=debug
        - N8N_LOG_OUTPUT=console
        - N8N_FEATURE_FLAG_DATA_TABLES=true
      volumes:
        - ./n8n/data:/home/node/.n8n
        - ./n8n/files:/files
      networks: 
        - evolution-network
      depends_on:
        postgres-n8n:
          condition: service_healthy

    nginx:
      build: 
        context: ./nginx
        dockerfile: Dockerfile
      container_name: nginx
      entrypoint: nginx -g "daemon off;"
      ports:
        - "8080:8080" #Evolution
        - "8081:8081" #Chatwoot
        - "8082:8082" #pgadmin
        - "8083:8083" #n8n
      networks: 
        - evolution-network
      depends_on:
        - evolution
        - n8n

    flowise:
      image: flowiseai/flowise:3.0.12
      container_name: flowise
      restart: unless-stopped
      env_file: ./flowise/.env
      environment:
        - PORT=3000
      ports:
        - "3000:3000"
      volumes:
        - flowise-data:/root/.flowise
      networks:
        - evolution-network
      healthcheck:
        test: ["CMD", "curl", "-f", "http://localhost:3000/api/v1/ping"]
        interval: 10s
        timeout: 5s
        retries: 5
        start_period: 30s
      entrypoint: ["/bin/sh", "-c", "sleep 3; flowise start"]

  volumes:
    flowise-data:

  networks: 
    evolution-network:
      name: evolution-network
      driver: bridge
